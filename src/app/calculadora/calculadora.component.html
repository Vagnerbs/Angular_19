<div class="container">
    <div class="form-box">
        <form #calculadoraForm="ngForm" (ngSubmit)="calcularResultado()">
            <h2>Calculadora</h2>
            <label for="numero1">Número 1</label>
            <input type="number" name="numero1" id="numero1" [(ngModel)]="numero1">
            <!-- [()] é a sintaxe de two-way data binding do Angular, que permite receber o 
            valor de um componente --> 
            
            <label for="numero2">Número 2</label>
            <input type="number" name="numero2" id="numero2" [(ngModel)]="numero2">

            <button type="submit">Somar</button>
            <!-- O atributo "submit" permite enviar o formulário ao pressionar Enter.
            Assim, o cálculo pode ser feito tanto clicando em "Calcular" quanto pressionando Enter. -->

        </form>

        <div class="result-display">
            <p>Resultado: <span id="result"> {{ resultado }}</span></p>
        </div>
    </div>
</div>
